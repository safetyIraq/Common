plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services' // تأكد من إضافة هذا السطر
}

android {
    namespace 'com.example.emptyactivity'
    compileSdk 35
    defaultConfig {
        applicationId "com.example.emptyactivity"
        minSdk 21
        targetSdk 35
        versionCode 2
        versionName "2.0"
    }
    buildTypes { release { minifyEnabled false } }
    compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8; }
    configurations.all {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
    
    // محرك منصة حسين (Firebase)
    implementation platform('com.google.firebase:firebase-bom:32.2.0')
    implementation 'com.google.firebase:firebase-auth' // للحسابات بالرقم
    implementation 'com.google.firebase:firebase-database' // للبحث والمراسلة
}
