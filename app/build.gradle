plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services' // هذا السطر اللي يربط تطبيقك بسيرفر فايربيس
}

android {
    namespace 'com.example.emptyactivity'
    compileSdk 35

    defaultConfig {
        applicationId "com.example.emptyactivity"
        minSdk 21
        targetSdk 35
        versionCode 2
        versionName "2.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // أمر عسكري لحل مشكلة التكرار (Duplicate Class) في مكتبات كوتلن
    configurations.all {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    }
}

dependencies {
    // مكتبات الواجهة الأساسية
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
    
    // محرك المنصة (Firebase)
    implementation platform('com.google.firebase:firebase-bom:32.2.0')
    implementation 'com.google.firebase:firebase-auth'     // للحسابات والرسائل النصية
    implementation 'com.google.firebase:firebase-database' // لقاعدة البيانات والبحث عن الأصدقاء

    // مكتبات إضافية
    implementation 'org.json:json:20230227'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}
