name: Build Telegram Sender App

# يشتغل الكود تلقائياً أول ما ترفع (Commit) أي تعديل
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع مالتك
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد بيئة الجافا (النسخة الحديثة 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. إعطاء صلاحية التشغيل للمحرك (Gradle)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. عملية بناء التطبيق وتحويله لـ APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. رفع ملف الـ APK الجاهز حتى تكدر تحمله (إصدار v4)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hussain-Telegram-App
          path: app/build/outputs/apk/debug/app-debug.apk
